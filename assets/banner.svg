<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#44bd9e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="0"/>
  
  <!-- Decorative grid dots -->
  <g opacity="0.08" fill="#fff">
    <circle cx="50" cy="50" r="2"/><circle cx="100" cy="50" r="2"/><circle cx="150" cy="50" r="2"/><circle cx="200" cy="50" r="2"/><circle cx="250" cy="50" r="2"/>
    <circle cx="50" cy="100" r="2"/><circle cx="100" cy="100" r="2"/><circle cx="150" cy="100" r="2"/><circle cx="200" cy="100" r="2"/><circle cx="250" cy="100" r="2"/>
    <circle cx="50" cy="150" r="2"/><circle cx="100" cy="150" r="2"/><circle cx="150" cy="150" r="2"/><circle cx="200" cy="150" r="2"/><circle cx="250" cy="150" r="2"/>
    <circle cx="50" cy="200" r="2"/><circle cx="100" cy="200" r="2"/><circle cx="150" cy="200" r="2"/><circle cx="200" cy="200" r="2"/><circle cx="250" cy="200" r="2"/>
    <circle cx="50" cy="250" r="2"/><circle cx="100" cy="250" r="2"/><circle cx="150" cy="250" r="2"/><circle cx="200" cy="250" r="2"/><circle cx="250" cy="250" r="2"/>
    <circle cx="950" cy="50" r="2"/><circle cx="1000" cy="50" r="2"/><circle cx="1050" cy="50" r="2"/><circle cx="1100" cy="50" r="2"/><circle cx="1150" cy="50" r="2"/>
    <circle cx="950" cy="100" r="2"/><circle cx="1000" cy="100" r="2"/><circle cx="1050" cy="100" r="2"/><circle cx="1100" cy="100" r="2"/><circle cx="1150" cy="100" r="2"/>
    <circle cx="950" cy="150" r="2"/><circle cx="1000" cy="150" r="2"/><circle cx="1050" cy="150" r="2"/><circle cx="1100" cy="150" r="2"/><circle cx="1150" cy="150" r="2"/>
    <circle cx="950" cy="200" r="2"/><circle cx="1000" cy="200" r="2"/><circle cx="1050" cy="200" r="2"/><circle cx="1100" cy="200" r="2"/><circle cx="1150" cy="200" r="2"/>
    <circle cx="950" cy="250" r="2"/><circle cx="1000" cy="250" r="2"/><circle cx="1050" cy="250" r="2"/><circle cx="1100" cy="250" r="2"/><circle cx="1150" cy="250" r="2"/>
  </g>
  
  <!-- Shield icon -->
  <g transform="translate(420, 80)">
    <path d="M30 10 L55 0 L80 10 L80 45 C80 65 55 80 55 80 C55 80 30 65 30 45 Z" fill="url(#shield)" opacity="0.9"/>
    <path d="M48 35 L53 40 L65 28" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Title -->
  <text x="520" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="-1">mu-skill-creator</text>
  
  <!-- Subtitle -->
  <text x="420" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#a0aec0">Skill Creation &amp; Quality Audit Framework</text>
  
  <!-- Accent line -->
  <rect x="420" y="190" width="360" height="3" fill="url(#accent)" rx="1.5"/>
  
  <!-- Stats -->
  <g transform="translate(420, 220)" font-family="system-ui, -apple-system, sans-serif">
    <rect x="0" y="0" width="120" height="36" rx="18" fill="rgba(233,69,96,0.15)" stroke="rgba(233,69,96,0.4)" stroke-width="1"/>
    <text x="60" y="23" text-anchor="middle" font-size="13" font-weight="600" fill="#e94560">3 Decisions</text>
    
    <rect x="135" y="0" width="145" height="36" rx="18" fill="rgba(78,205,196,0.15)" stroke="rgba(78,205,196,0.4)" stroke-width="1"/>
    <text x="207" y="23" text-anchor="middle" font-size="13" font-weight="600" fill="#4ecdc4">20 Anti-Patterns</text>
    
    <rect x="295" y="0" width="135" height="36" rx="18" fill="rgba(245,166,35,0.15)" stroke="rgba(245,166,35,0.4)" stroke-width="1"/>
    <text x="362" y="23" text-anchor="middle" font-size="13" font-weight="600" fill="#f5a623">23 Audit Items</text>
  </g>
</svg>
